<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溢彩画</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e12;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.gw{font-family:'Noto Sans SC',sans-serif;padding:1.5rem 1.2rem 1.2rem;max-width:580px;width:100%;margin:0 auto;user-select:none;background:#18181f;border-radius:14px;border:1px solid rgba(255,255,255,.06)}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.ttl{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:#e8e6df;letter-spacing:.12em}
.sub{font-size:11px;color:#706f6a;letter-spacing:.06em;margin-top:3px;display:flex;align-items:center;gap:6px}
.lv{font-size:11px;color:#9d9b93;letter-spacing:.06em;margin-top:2px}
.td{width:14px;height:14px;border-radius:3px;display:inline-block;vertical-align:middle;border:1.5px solid rgba(255,255,255,.15)}
.stats{display:flex;gap:20px}
.si{display:flex;flex-direction:column;align-items:flex-end}
.sl{font-size:10px;color:#706f6a;letter-spacing:.1em}
.sv{font-size:22px;font-weight:500;color:#e8e6df;line-height:1.1;font-variant-numeric:tabular-nums}
.sv.warn{color:#EF9F27}.sv.danger{color:#D85A30}
.board{display:grid;gap:2px;border-radius:10px;padding:6px;background:#111116;border:1px solid rgba(255,255,255,.06)}
.cell{border-radius:3px;cursor:pointer;transition:filter .1s;aspect-ratio:1}
.cell:hover{filter:brightness(1.18)}
.cell:active{filter:brightness(.85)}
.pr{display:flex;gap:10px;margin-top:1rem;align-items:center;justify-content:center}
.pl{font-size:11px;color:#706f6a;letter-spacing:.08em}
.sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative}
.sw.active{transform:scale(1.28);border-color:#e8e6df;box-shadow:0 0 12px rgba(255,255,255,.1)}
.sw:hover:not(.active){transform:scale(1.1)}
.sw.is-target::after{content:'';position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;background:#fff;border:1.5px solid rgba(0,0,0,.2)}
.ar{display:flex;gap:8px;margin-top:1rem;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Noto Sans SC',sans-serif;font-size:12px;padding:7px 18px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#c4c2ba;cursor:pointer;letter-spacing:.05em;transition:background .12s,border-color .15s}
.btn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18)}
.btn:active{transform:scale(.97)}
.btn.p{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}
.ht{font-size:11px;color:#706f6a;text-align:center;margin-top:8px;letter-spacing:.04em;min-height:16px}
.pbw{height:2px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .35s ease}
.ov-wrap{position:relative}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.6);border-radius:10px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:2}
.ov.show{opacity:1;pointer-events:all}
.ot{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:.14em;margin-bottom:6px}
.os{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:20px;letter-spacing:.05em}
.ob{font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:9px 28px;border-radius:8px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;letter-spacing:.08em;transition:background .15s}
.ob:hover{background:rgba(255,255,255,.18)}
.footer{text-align:center;margin-top:1rem;font-size:10px;color:#4a4945;letter-spacing:.05em}
</style>
</head>
<body>
<div class="gw">
<div class="hdr">
  <div>
    <div class="ttl">溢彩画</div>
    <div class="lv" id="lvl">第 1 关</div>
    <div class="sub">目标：染成 <span class="td" id="targetDot"></span></div>
  </div>
  <div class="stats">
    <div class="si"><span class="sl">进度</span><span class="sv" id="pct">0%</span></div>
    <div class="si"><span class="sl">剩余</span><span class="sv" id="steps">—</span></div>
  </div>
</div>
<div class="ov-wrap">
  <div class="board" id="board"></div>
  <div class="ov" id="ov"><div class="ot" id="ot"></div><div class="os" id="os"></div><button class="ob" id="ovBtn"></button></div>
</div>
<div class="pbw"><div class="pb" id="pb" style="width:0%"></div></div>
<div class="pr"><span class="pl">选色</span><div id="swWrap" style="display:flex;gap:10px;align-items:center"></div></div>
<div class="ar">
  <button class="btn" onclick="restartLevel()">重来</button>
  <button class="btn" onclick="undoMove()">撤回</button>
  <button class="btn" onclick="skipLevel()">跳关</button>
  <button class="btn p" onclick="newGame()">重置</button>
</div>
<div class="ht" id="ht"></div>
<div class="footer">溢彩画 — flood fill puzzle</div>
</div>

<script>
const COLORS=['#5DCAA5','#7F77DD','#D85A30'];
const CNAMES=['翠','堇','赤'];
const GR=10,GC=14,TOT=GR*GC,NC=3;

const LEVELS=[
  {sc:10,min:3},{sc:12,min:3},{sc:14,min:4},{sc:16,min:4},
  {sc:18,min:4},{sc:20,min:5},{sc:22,min:5},{sc:25,min:5},
];

let grid,curColor,stepsLeft,maxSteps,hist,over,lvIdx,initG,tgt;
function lv(i){return LEVELS[Math.min(i,LEVELS.length-1)];}
function cl(g){return g.map(r=>[...r]);}

function regAt(g,sr,sc){
  const co=g[sr][sc],v=Array.from({length:GR},()=>new Uint8Array(GC));
  const q=[[sr,sc]],cells=[];v[sr][sc]=1;
  while(q.length){const[r,c]=q.shift();cells.push([r,c]);for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<GR&&nc>=0&&nc<GC&&!v[nr][nc]&&g[nr][nc]===co){v[nr][nc]=1;q.push([nr,nc]);}}}
  return cells;
}
function bfsSub(g,sr,sc,co,mx){
  const v=Array.from({length:GR},()=>new Uint8Array(GC));
  const q=[[sr,sc]],res=[];v[sr][sc]=1;
  while(q.length&&res.length<mx){const i=Math.floor(Math.random()*q.length);const[r,c]=q.splice(i,1)[0];if(g[r][c]===co)res.push([r,c]);for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<GR&&nc>=0&&nc<GC&&!v[nr][nc]&&g[nr][nc]===co){v[nr][nc]=1;q.push([nr,nc]);}}}
  return res;
}

function buildGraph(g){
  const rm=Array.from({length:GR},()=>new Int8Array(GC).fill(-1));
  const cols=[];let rid=0;
  for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){
    if(rm[r][c]===-1){const co=g[r][c],q=[[r,c]];rm[r][c]=rid;
      while(q.length){const[nr,nc]=q.shift();for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const rr=nr+dr,cc=nc+dc;if(rr>=0&&rr<GR&&cc>=0&&cc<GC&&rm[rr][cc]===-1&&g[rr][cc]===co){rm[rr][cc]=rid;q.push([rr,cc]);}}}
      cols.push(co);rid++;}}
  const n=rid,adj=new Uint8Array(n*n);
  for(let r=0;r<GR;r++)for(let c=0;c<GC;c++)for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<GR&&cc>=0&&cc<GC&&rm[r][c]!==rm[rr][cc]){adj[rm[r][c]*n+rm[rr][cc]]=1;adj[rm[rr][cc]*n+rm[r][c]]=1;}}
  return{c:new Int8Array(cols),a:adj,n};
}
function clS(s){return{c:new Int8Array(s.c),a:new Uint8Array(s.a),n:s.n};}
function paintS(s,rid,nc){
  s.c[rid]=nc;let go=true;
  while(go){go=false;for(let i=0;i<s.n;i++){if(i!==rid&&s.c[i]===nc&&s.a[rid*s.n+i]){for(let j=0;j<s.n;j++){if(j!==rid&&j!==i&&s.a[i*s.n+j]){s.a[rid*s.n+j]=1;s.a[j*s.n+rid]=1;}}s.c[i]=-1;for(let j=0;j<s.n;j++){s.a[i*s.n+j]=0;s.a[j*s.n+i]=0;}go=true;}}}
}
function isDone(s,t){for(let i=0;i<s.n;i++)if(s.c[i]!==-1&&s.c[i]!==t)return false;return true;}

let _dl=0;
function iddfs(g,target){
  const s0=buildGraph(g);if(isDone(s0,target))return 0;
  _dl=Date.now()+400;
  for(let d=1;d<=6;d++){const r=dfs(s0,target,d);if(r===true)return d;if(r==='t')return 99;}
  return 99;
}
function dfs(s,target,depth){
  if(Date.now()>_dl)return 't';
  if(isDone(s,target))return true;if(depth===0)return false;
  for(let i=0;i<s.n;i++){
    if(s.c[i]===-1||s.c[i]===target)continue;
    const rc=s.c[i];
    const s1=clS(s);paintS(s1,i,target);
    const r1=dfs(s1,target,depth-1);if(r1===true)return true;if(r1==='t')return 't';
    const adjC=new Set();
    for(let j=0;j<s.n;j++)if(s.a[i*s.n+j]&&s.c[j]!==-1&&s.c[j]!==rc&&s.c[j]!==target)adjC.add(s.c[j]);
    for(const col of adjC){const s2=clS(s);paintS(s2,i,col);const r2=dfs(s2,target,depth-1);if(r2===true)return true;if(r2==='t')return 't';}
  }
  return false;
}

function scramble(sc){
  const base=Math.floor(Math.random()*NC);
  const g=Array.from({length:GR},()=>new Array(GC).fill(base));
  for(let s=0;s<sc;s++){
    const pr=Math.floor(Math.random()*GR),pc=Math.floor(Math.random()*GC);
    const cc=g[pr][pc],reg=regAt(g,pr,pc);
    if(reg.length<3)continue;
    const sz=Math.max(2,Math.floor(reg.length*(0.08+Math.random()*0.2)));
    const sub=bfsSub(g,pr,pc,cc,sz);if(sub.length<2)continue;
    let nc2;do{nc2=Math.floor(Math.random()*NC);}while(nc2===cc);
    for(const[r,c]of sub)g[r][c]=nc2;
  }
  const f=g[0][0];if(g.every(row=>row.every(v=>v===f)))return null;
  return{g,base};
}

function generate(lv2){
  let best=null,bestS=0;
  for(let att=0;att<25;att++){
    const res=scramble(lv2.sc);if(!res)continue;
    const sol=iddfs(res.g,res.base);
    if(sol>=lv2.min&&sol<90&&sol>=bestS){best={grid:cl(res.g),target:res.base,steps:sol};bestS=sol;}
  }
  if(!best){for(let att=0;att<10;att++){const res=scramble(lv2.sc);if(!res)continue;const sol=iddfs(res.g,res.base);if(sol>=2&&sol<90){best={grid:cl(res.g),target:res.base,steps:sol};break;}}}
  if(!best)best={grid:Array.from({length:GR},()=>{const a=[];for(let c=0;c<GC;c++)a.push(Math.floor(Math.random()*NC));return a;}),target:0,steps:3};
  return best;
}

function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns='repeat('+GC+',1fr)';board.innerHTML='';
  for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){
    const cell=document.createElement('div');cell.className='cell';
    cell.style.background=COLORS[grid[r][c]];
    cell.dataset.r=r;cell.dataset.c=c;
    cell.addEventListener('click',onCellClick);board.appendChild(cell);
  }
}
function updateBoard(){const cells=document.querySelectorAll('.cell');let idx=0;for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){cells[idx].style.background=COLORS[grid[r][c]];idx++;}}
function onCellClick(e){
  if(over)return;const r=+e.target.dataset.r,c=+e.target.dataset.c;
  if(grid[r][c]===curColor)return;
  const cells=regAt(grid,r,c);if(!cells.length)return;
  hist.push(cl(grid));stepsLeft--;
  for(const[rr,cc]of cells)grid[rr][cc]=curColor;
  updateBoard();checkEnd();updateUI();
}
function initLevel(idx){
  lvIdx=idx;
  setTimeout(function(){
    var lv2=lv(idx);var res=generate(lv2);
    grid=res.grid;tgt=res.target;initG=cl(grid);
    maxSteps=res.steps;stepsLeft=maxSteps;curColor=tgt;over=false;hist=[];
    document.getElementById('ov').classList.remove('show');
    document.getElementById('lvl').textContent='第 '+(idx+1)+' 关';
    document.getElementById('targetDot').style.background=COLORS[tgt];
    document.getElementById('ht').textContent='染成「'+CNAMES[tgt]+'」· 限 '+maxSteps+' 步';
    buildSw();renderBoard();updateUI();
  },20);
}
function newGame(){initLevel(0);}
function restartLevel(){grid=cl(initG);stepsLeft=maxSteps;over=false;hist=[];document.getElementById('ov').classList.remove('show');buildSw();updateBoard();updateUI();}
function skipLevel(){initLevel(lvIdx+1);}
function checkEnd(){
  let ok=true;for(let r=0;r<GR&&ok;r++)for(let c=0;c<GC&&ok;c++)if(grid[r][c]!==tgt)ok=false;
  if(ok){over=true;document.getElementById('ot').textContent='画作完成';document.getElementById('os').textContent='第 '+(lvIdx+1)+' 关 · 完美 '+maxSteps+' 步';document.getElementById('ovBtn').textContent='下一关';document.getElementById('ovBtn').onclick=function(){initLevel(lvIdx+1)};setTimeout(function(){document.getElementById('ov').classList.add('show')},250);return;}
  if(stepsLeft<=0){over=true;document.getElementById('ot').textContent='步数用尽';document.getElementById('os').textContent='试试不同的顺序';document.getElementById('ovBtn').textContent='重来';document.getElementById('ovBtn').onclick=function(){restartLevel()};setTimeout(function(){document.getElementById('ov').classList.add('show')},250);}
}
function updateUI(){
  let cnt=0;for(const row of grid)for(const v of row)if(v===tgt)cnt++;
  const pct=Math.round(cnt/TOT*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pb').style.background=COLORS[tgt];
  const sv=document.getElementById('steps');sv.textContent=stepsLeft;
  sv.className='sv'+(stepsLeft<=1?' danger':stepsLeft<=2?' warn':'');
}
function undoMove(){if(!hist.length||over)return;grid=hist.pop();stepsLeft++;over=false;document.getElementById('ov').classList.remove('show');updateBoard();updateUI();}
function buildSw(){
  const w=document.getElementById('swWrap');w.innerHTML='';
  for(let i=0;i<NC;i++){const d=document.createElement('div');d.className='sw'+(i===curColor?' active':'')+(i===tgt?' is-target':'');d.style.background=COLORS[i];d.addEventListener('click',(function(idx){return function(){curColor=idx;document.querySelectorAll('.sw').forEach(function(s,j){s.classList.toggle('active',j===idx)})}})(i));w.appendChild(d);}
}
initLevel(0);
</script>
</body>
</html>
